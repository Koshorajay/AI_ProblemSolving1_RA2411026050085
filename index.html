<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TIC TAC TOE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #050810;
      --panel:    #0a0f1e;
      --x-color:  #00f5ff;
      --o-color:  #ff2d78;
      --grid:     #1a2240;
      --win:      #ffe600;
      --text:     #c8d8ff;
      --glow-x:   0 0 8px #00f5ff, 0 0 24px #00f5ff66;
      --glow-o:   0 0 8px #ff2d78, 0 0 24px #ff2d7866;
      --glow-win: 0 0 12px #ffe600, 0 0 36px #ffe60088;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      padding: 40px 16px;
    }

    /* Animated scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* Floating grid dots background */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(rgba(0,245,255,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* Title */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--x-color), var(--o-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px #00f5ff88);
      animation: titlePulse 3s ease-in-out infinite alternate;
    }

    @keyframes titlePulse {
      from { filter: drop-shadow(0 0 10px #00f5ff66); }
      to   { filter: drop-shadow(0 0 28px #ff2d7888); }
    }

    /* Score board */
    .scoreboard {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .score-card {
      background: var(--panel);
      border: 1px solid var(--grid);
      border-radius: 8px;
      padding: 10px 24px;
      text-align: center;
      min-width: 90px;
      transition: border-color 0.3s;
    }

    .score-card.active-x { border-color: var(--x-color); box-shadow: var(--glow-x); }
    .score-card.active-o { border-color: var(--o-color); box-shadow: var(--glow-o); }

    .score-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      opacity: 0.6;
      text-transform: uppercase;
    }

    .score-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin: 2px 0;
    }

    .score-name.x { color: var(--x-color); text-shadow: var(--glow-x); }
    .score-name.o { color: var(--o-color); text-shadow: var(--glow-o); }

    .score-val {
      font-size: 1.6rem;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
    }

    .score-divider {
      font-size: 0.8rem;
      opacity: 0.4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    /* Status */
    .status {
      font-size: clamp(0.75rem, 2.5vw, 0.95rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 1.4em;
      transition: all 0.3s;
    }

    .status.x-turn { color: var(--x-color); text-shadow: var(--glow-x); }
    .status.o-turn { color: var(--o-color); text-shadow: var(--glow-o); }
    .status.win     { color: var(--win);     text-shadow: var(--glow-win); animation: blink 0.7s step-start infinite; }
    .status.draw    { color: #aaa; }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      background: var(--grid);
      border: 2px solid var(--grid);
      border-radius: 14px;
      padding: 6px;
      box-shadow: 0 0 40px rgba(0,245,255,0.08), 0 0 80px rgba(255,45,120,0.06);
    }

    .cell {
      width:  clamp(90px, 22vw, 130px);
      height: clamp(90px, 22vw, 130px);
      background: var(--panel);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s;
    }

    .cell:hover:not(.taken) {
      background: #0d1630;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    /* X and O SVG marks */
    .mark {
      width: 56%;
      height: 56%;
      opacity: 0;
      transform: scale(0) rotate(-20deg);
      transition: opacity 0.25s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .mark.show {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .mark.win-mark {
      animation: winPulse 0.6s ease forwards;
    }

    @keyframes winPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.22); }
      70%  { transform: scale(0.94); }
      100% { transform: scale(1.08); }
    }

    /* X strokes */
    .x-line { stroke: var(--x-color); filter: drop-shadow(0 0 6px var(--x-color)); }

    /* O circle */
    .o-circle {
      fill: none;
      stroke: var(--o-color);
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      filter: drop-shadow(0 0 6px var(--o-color));
      transition: stroke-dashoffset 0.4s ease;
    }
    .mark.show .o-circle { stroke-dashoffset: 0; }

    /* Win line overlay */
    .win-overlay {
      position: absolute;
      pointer-events: none;
    }

    /* Buttons */
    .controls {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 22px;
      border-radius: 6px;
      border: 1px solid;
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
    }

    .btn-restart {
      color: var(--x-color);
      border-color: var(--x-color);
    }
    .btn-restart:hover {
      background: var(--x-color);
      color: var(--bg);
      box-shadow: var(--glow-x);
    }

    .btn-reset {
      color: var(--o-color);
      border-color: var(--o-color);
    }
    .btn-reset:hover {
      background: var(--o-color);
      color: var(--bg);
      box-shadow: var(--glow-o);
    }

    /* Mode toggle */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 24px;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute; inset: 0;
      background: var(--grid);
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid #1e2d56;
      transition: background 0.3s;
    }

    .toggle input:checked + .toggle-track { background: #1a0a20; border-color: var(--o-color); }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: var(--x-color);
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
      box-shadow: var(--glow-x);
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(24px);
      background: var(--o-color);
      box-shadow: var(--glow-o);
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 14px;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      opacity: 0.3;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="title">Tic Tac Toe</div>

  <!-- Score -->
  <div class="scoreboard">
    <div class="score-card active-x" id="card-x">
      <div class="score-label">Player</div>
      <div class="score-name x">X</div>
      <div class="score-val" id="score-x">0</div>
    </div>
    <div class="score-divider">
      <span id="draws-label">DRAWS</span>
      <span id="score-d">0</span>
    </div>
    <div class="score-card" id="card-o">
      <div class="score-label" id="o-label">Player</div>
      <div class="score-name o">O</div>
      <div class="score-val" id="score-o">0</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status x-turn" id="status">X's Turn</div>

  <!-- Board -->
  <div class="board" id="board">
    <div class="cell" data-i="0"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="1"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="2"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="3"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="4"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="5"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="6"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="7"><svg class="mark" viewBox="0 0 100 100"></svg></div>
    <div class="cell" data-i="8"><svg class="mark" viewBox="0 0 100 100"></svg></div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-restart" onclick="restartGame()">↺ New Game</button>
    <button class="btn btn-reset"   onclick="resetScores()">⊗ Reset Scores</button>
  </div>

  <!-- Mode Toggle -->
  <div class="mode-row">
    <span>2 Player</span>
    <label class="toggle">
      <input type="checkbox" id="aiToggle" onchange="toggleMode()"/>
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
    <span>vs AI</span>
  </div>

</div>

<footer>Built with ♥ · GitHub Pages Ready</footer>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  let vsAI = false;
  let scores = { X:0, O:0, D:0 };

  const cells   = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');
  const cardX    = document.getElementById('card-x');
  const cardO    = document.getElementById('card-o');

  function toggleMode() {
    vsAI = document.getElementById('aiToggle').checked;
    document.getElementById('o-label').textContent = vsAI ? 'AI' : 'Player';
    restartGame();
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;
      if (vsAI && current === 'O') return;
      play(i);
    });
  });

  function play(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    renderCell(i, current);

    const win = checkWin(board, current);
    if (win) {
      endGame(current, win);
      return;
    }
    if (board.every(v => v)) {
      endGame(null, null);
      return;
    }
    current = current === 'X' ? 'O' : 'X';
    updateStatus();

    if (vsAI && current === 'O' && !gameOver) {
      setTimeout(aiMove, 420);
    }
  }

  function aiMove() {
    const idx = getBestMove();
    play(idx);
  }

  function getBestMove() {
    // Minimax
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, 0, false);
        board[i] = null;
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  function minimax(b, depth, isMax) {
    const winner = checkWin(b, 'O') ? 'O' : checkWin(b, 'X') ? 'X' : null;
    if (winner === 'O') return 10 - depth;
    if (winner === 'X') return depth - 10;
    if (b.every(v => v)) return 0;

    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          best = Math.max(best, minimax(b, depth+1, false));
          b[i] = null;
        }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'X';
          best = Math.min(best, minimax(b, depth+1, true));
          b[i] = null;
        }
      }
      return best;
    }
  }

  function checkWin(b, player) {
    return WINS.find(combo => combo.every(i => b[i] === player)) || null;
  }

  function renderCell(i, player) {
    const svg = cells[i].querySelector('svg');
    svg.innerHTML = player === 'X' ? xMark() : oMark();
    cells[i].classList.add('taken');
    requestAnimationFrame(() => svg.classList.add('show'));
  }

  function xMark() {
    return `
      <line class="x-line" x1="20" y1="20" x2="80" y2="80" stroke-width="12" stroke-linecap="round"/>
      <line class="x-line" x1="80" y1="20" x2="20" y2="80" stroke-width="12" stroke-linecap="round"/>
    `;
  }

  function oMark() {
    return `
      <circle class="o-circle" cx="50" cy="50" r="32" stroke-width="12" stroke-linecap="round"/>
    `;
  }

  function endGame(winner, combo) {
    gameOver = true;
    if (winner) {
      scores[winner]++;
      document.getElementById(`score-${winner.toLowerCase()}`).textContent = scores[winner];
      statusEl.textContent = (vsAI && winner === 'O') ? '🤖 AI Wins!' : `${winner} Wins! 🎉`;
      statusEl.className = 'status win';

      combo.forEach(i => {
        cells[i].querySelector('svg').classList.add('win-mark');
      });
    } else {
      scores.D++;
      document.getElementById('score-d').textContent = scores.D;
      statusEl.textContent = "It's a Draw!";
      statusEl.className = 'status draw';
    }
    updateCards();
  }

  function updateStatus() {
    if (vsAI && current === 'O') {
      statusEl.textContent = '🤖 AI Thinking...';
      statusEl.className = 'status o-turn';
    } else {
      statusEl.textContent = `${current}'s Turn`;
      statusEl.className = `status ${current === 'X' ? 'x' : 'o'}-turn`;
    }
    updateCards();
  }

  function updateCards() {
    if (gameOver) {
      cardX.className = 'score-card';
      cardO.className = 'score-card';
      return;
    }
    cardX.className = 'score-card' + (current === 'X' ? ' active-x' : '');
    cardO.className = 'score-card' + (current === 'O' ? ' active-o' : '');
  }

  function restartGame() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cells.forEach(cell => {
      const svg = cell.querySelector('svg');
      svg.innerHTML = '';
      svg.className = 'mark';
      cell.classList.remove('taken');
    });
    updateStatus();
  }

  function resetScores() {
    scores = { X:0, O:0, D:0 };
    document.getElementById('score-x').textContent = '0';
    document.getElementById('score-o').textContent = '0';
    document.getElementById('score-d').textContent = '0';
    restartGame();
  }

  updateStatus();
</script>
</body>
</html>
